<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kizumi Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

body {
  height: 100vh;
  background: #062f24;
  overflow: hidden;
}

/* 🌌 GRID BACKGROUND */
.background {
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(#0f5132 1px, transparent 1px),
    linear-gradient(90deg, #0f5132 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveGrid 5s linear infinite;
}

@keyframes moveGrid {
  from { background-position: 0 0; }
  to { background-position: 40px 40px; }
}

/* ✨ SPRINKLES */
.background::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(#00ffcc 1px, transparent 1px);
  background-size: 20px 20px;
  opacity: 0.3;
  animation: sparkle 6s linear infinite;
}

@keyframes sparkle {
  from { transform: translateY(0); }
  to { transform: translateY(-40px); }
}

/* 💚 LOGIN BOX */
.login-box {
  position: relative;
  z-index: 2;
  width: 320px;
  padding: 30px;
  background: rgba(0, 50, 40, 0.9);
  border-radius: 12px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
  box-shadow: 0 0 20px #00ffcc;
}

.login-box h2 {
  color: #00ffcc;
  margin-bottom: 20px;
}

/* Inputs */
.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
  background: #0f3d30;
  color: white;
  outline: none;
}

.login-box input::placeholder {
  color: #9adbcf;
}

/* Button */
.login-box button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  border: none;
  background: #00cc99;
  color: black;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.login-box button:hover {
  background: #00ffcc;
  box-shadow: 0 0 10px #00ffcc;
}
</style>

</head>

<body>

<div class="background"></div>

<div class="login-box">
  <h2>Sign Up to Kizumi</h2>

  <input type="text" placeholder="Enter your Username">
  <input type="email" placeholder="Enter your email">
  <input type="password" placeholder="Password">
  <input type="password" placeholder="Confirm Password">

  <button>Signup Now</button>
</div>

</body>
</html>
